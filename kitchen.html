<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Kitchen - Sabbatical Journey</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #111; color: #fff; text-align: center; padding: 20px; }
        .kitchen-box { max-width: 800px; margin: 0 auto; background: #1f1f1f; padding: 30px; border: 2px solid #ff9900; border-radius: 8px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .photo-frame { width: 220px; height: 220px; background: #333; border: 3px solid #ff9900; display: flex; align-items: center; justify-content: center; color: #aaa; font-weight: bold; }
        .btn-back { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #cc0000; color: white; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="kitchen-box">
        <h1>🍳 Welcome to the Kitchen!</h1>
        <p>This is where I spent my operational sabbatical, translating systems thinking into culinary execution.</p>
        
        <h3>My Culinary Gallery</h3>
        <div class="grid">
            <!-- Put your photo links inside the "src" later! -->
            <div class="photo-frame"><img src="dish1.jpg" alt="Dish 1 Placeholder" style="width:100%; height:100%; object-fit:cover;"></div>
            <div class="photo-frame"><img src="dish2.jpg" alt="Dish 2 Placeholder" style="width:100%; height:100%; object-fit:cover;"></div>
            <div class="photo-frame"><img src="kitchen_team.jpg" alt="Team Placeholder" style="width:100%; height:100%; object-fit:cover;"></div>
        </div>

        <!-- UNIVERSAL NAVIGATION BACK TO MAIN SCREEN -->
        <br>
        <a href="index.html" class="btn-back">⬅️ Walk Back to Dining Room Menu</a>
    </div>

</body>
</html>
