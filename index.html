<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Entry Portal</title>
    <style>
        /* Custom Font Engine Definition */
        @font-face {
            font-family: 'Le Jour Serif';
            src: url('LeJourSerif.woff2') format('woff2'),
                 url('LeJourSerif.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        body { 
            background: url('OpenPage.png') no-repeat center center fixed; 
            background-size: cover; 
            background-color: #121212; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif; 
        }
        header { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 25px 40px; 
            background: rgba(0, 0, 0, 0.55); 
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }
        .nav-links { 
            list-style: none; 
            display: flex; 
            gap: 45px; 
            padding: 0; 
            margin: 0; 
        }
        .nav-links a { 
            color: #d4af37; 
            text-decoration: none; 
            font-weight: bold; 
            /* Header navigation links styled with Le Jour Serif */
            font-family: 'Le Jour Serif', 'Georgia', serif;
            font-size: 20px; 
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }
        .nav-links a:hover { 
            color: #ffffff; 
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.7);
        }
        .disabled-canvas-shield {
            position: absolute;
            top: 100px;
            left: 0;
            width: 100%;
            height: calc(100vh - 100px);
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="About.html">About us</a></li>
                <li><a href="Service.html">Service</a></li>
                <li><a href="Contact.html">Contact us</a></li>
            </ul>
        </nav>
    </header>

    <div class="disabled-canvas-shield"></div>

</body>
</html>
