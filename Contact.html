<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.85)), url('Background.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-repeat: no-repeat;
            color: #f5f5f5; 
            font-family: 'Segoe UI', sans-serif; 
        }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(0,0,0,0.85); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .nav-links { list-style: none; display: flex; gap: 30px; padding: 0; margin: 0; }
        .nav-links a { color: #d4af37; text-decoration: none; font-weight: bold; font-size: 18px; }
        .nav-links a:hover { color: #ffffff; border-bottom: 2px solid #d4af37; }
        .container { max-width: 700px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        h1 { color: #d4af37; font-size: 2.5rem; margin-bottom: 30px; letter-spacing: 2px; }
        .contact-box { background: rgba(28, 28, 28, 0.9); border: 1px solid #d4af37; padding: 40px 30px; border-radius: 8px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .contact-list { list-style: none; padding: 0; margin: 0; font-size: 1.1rem; }
        .contact-list li { margin-bottom: 20px; line-height: 1.6; color: #cccccc; }
        .contact-list strong { color: #d4af37; display: inline-block; width: 100px; }
        .contact-list a { color: #ffffff; text-decoration: none; border-bottom: 1px dashed #d4af37; }
        .contact-list a:hover { color: #d4af37; }
        .cta-container { text-align: center; margin-top: 50px; }
        .cta-btn { display: inline-block; background: transparent; color: #d4af37; border: 2px solid #d4af37; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; text-decoration: none; border-radius: 4px; transition: all 0.3s ease; }
        .cta-btn:hover { background: #d4af37; color: #121212; transform: translateY(-3px); }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"><img src="logo.png" alt="Logo" style="height: 50px;"></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="About.html">About us</a></li>
                <li><a href="Service.html">Service</a></li>
                <li><a href="Contact.html">Contact us</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>COMMUNICATIONS REGISTRY</h1>
        
        <div class="contact-box">
            <ul class="contact-list">
                <li><strong>Location:</strong> Hyderabad, India</li>
                <li><strong>Channel:</strong> Private Enterprise Inquiry Network</li>
                <li><strong>Web:</strong> <a href="https://ykashwin.github.io/my-restaurant-portfolio" target="_blank">Portfolio Connection Portal</a></li>
            </ul>
        </div>

        <div class="cta-container">
            <a href="Open_page.html" class="cta-btn">Return to Main</a>
        </div>
    </main>

</body>
</html>
