<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        @font-face { font-family: 'Le Jour Serif'; src: url('LeJourSerif.woff2') format('woff2'), url('LeJourSerif.woff') format('woff'); font-weight: normal; font-style: normal; font-display: swap; }
        body { margin: 0; padding: 0; background: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.85)), url('Background.png'); background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat; color: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(0,0,0,0.85); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .nav-links { list-style: none; display: flex; gap: 25px; padding: 0; margin: 0; }
        .nav-links a { color: #d4af37; text-decoration: none; font-weight: bold; font-size: 16px; font-family: 'Le Jour Serif', serif; }
        .nav-links a:hover { color: #fff; }
        .container { max-width: 1100px; margin: 0 auto; padding: 50px 20px; text-align: center; }
        h1 { font-family: 'Le Jour Serif', 'Georgia', serif; color: #d4af37; font-size: 2.8rem; margin-bottom: 40px; letter-spacing: 3px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .contact-list strong { font-family: 'Le Jour Serif', 'Georgia', serif; color: #d4af37; display: inline-block; width: 120px; font-size: 1.25rem; letter-spacing: 0.5px; }
        .contact-box { display: flex; background: transparent; border: none; overflow: hidden; align-items: stretch; margin-bottom: 40px; min-height: 500px; }
        .contact-left-pane { flex: 1; position: relative; overflow: hidden; display: flex; }
        .contact-left-pane img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 12px; }
        .contact-right-pane { flex: 1.2; padding: 40px 0px 40px 60px; text-align: left; background: transparent; display: flex; align-items: center; }
        .contact-list { list-style: none; padding: 0; margin: 0; width: 100%; }
        .contact-list li { margin-bottom: 30px; line-height: 1.6; color: #f5f5f5; font-size: 1.2rem; }
        .contact-list a { color: #ffffff; text-decoration: none; border-bottom: 1px dashed #d4af37; transition: color 0.2s; }
        .contact-list a:hover { color: #d4af37; }
        .back-home-btn { display: inline-block; font-family: 'Le Jour Serif', serif; color: #d4af37; text-decoration: none; font-size: 1rem; border: 1px solid #d4af37; padding: 6px 16px; border-radius: 4px; transition: all 0.3s; background: rgba(0,0,0,0.4); }
        .back-home-btn:hover { color: #fff; border-color: #fff; }
        @media (max-width: 850px) { .contact-box { flex-direction: column; min-height: auto; } .contact-left-pane { width: 100%; height: 350px; } .contact-right-pane { padding: 40px 0px; } }
    </style>
</head>

                <li><a href="Service.html">Services</a></li>
                <li><a href="Contact.html" style="color:#fff;">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <h1>CONTACT US</h1>
        <div class="contact-box">
            <div class="contact-left-pane"><img src="Contact.png" alt="Featured Presentation Showcase"></div>
            <div class="contact-right-pane">
                <ul class="contact-list">
                    <li><strong>Channel:</strong> <a href="https://linkedin.com/in/ashwin-yadhav-kumar" target="_blank">LinkedIn</a></li>
                    <li><strong>Location:</strong> India</li>
                    <li><strong>Mobile:</strong> +91 630 188 7244 (India) | +44 734 101 5971 (UK)</li>
                    <li><strong>Web:</strong> <a href="https://ykashwin.github.io/my-restaurant-portfolio" target="_blank">The Bar Analyst Restaurant</a></li>
                    <li><strong>Email:</strong> <a href="mailto:ykashwin@gmail.com">ykashwin@gmail.com</a></li>
                </ul>
            </div>
        </div>
        <a href="menu.html" class="back-home-btn">← Back to Directory</a>
    </main>
</body>
</html>
